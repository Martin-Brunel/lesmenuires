# =============================================================================
# Déploiement production — Postgres + API Rust + Web Next.js + Caddy (TLS auto)
# Lancer depuis la racine du repo :
#   docker compose -f infra/docker-compose.prod.yml --env-file .env up -d --build
#
# Caddy termine le TLS et route : /api/* et /media/* -> api, tout le reste -> web.
# Le front et l'API partagent donc la même origine (https://$DOMAIN) : cookies
# de session et CORS "just work".
# =============================================================================

name: lesmenuires-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lesmenuires}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
      POSTGRES_DB: ${POSTGRES_DB:-lesmenuires}
      # Fuseau explicite : les fenêtres J-14/J-5 du scheduler comparent des dates
      # de séjour françaises à current_date. Sans TZ, Postgres serait en UTC et
      # basculerait de jour ~1-2 h trop tôt en soirée. Voir scheduler.rs.
      TZ: Europe/Paris
      PGTZ: Europe/Paris
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lesmenuires} -d ${POSTGRES_DB:-lesmenuires}"]
      interval: 5s
      timeout: 3s
      retries: 12
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
    # Pas de port exposé sur l'hôte : accès uniquement via le réseau interne.

  api:
    build:
      context: ../apps/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lesmenuires}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lesmenuires}
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      APP_ENV: production
      TZ: Europe/Paris
      API_BASE_URL: https://${DOMAIN}
      FRONT_ORIGIN: https://${DOMAIN}
      COOKIE_SECURE: "true"
      MEDIA_DIR: /app/media
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      SCHEDULER_INTERVAL_SECS: ${SCHEDULER_INTERVAL_SECS:-300}
    volumes:
      - media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  # Sauvegardes automatiques : dump Postgres + archive media, avec rétention.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-lesmenuires}
      POSTGRES_DB: ${POSTGRES_DB:-lesmenuires}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_INTERVAL_SECS: ${BACKUP_INTERVAL_SECS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      # Off-site optionnel (voir DEPLOY.md « Externalisation off-site ») :
      # destination rclone + config du remote "offsite" (S3-compatible).
      BACKUP_RCLONE_REMOTE: ${BACKUP_RCLONE_REMOTE:-}
      RCLONE_CONFIG_OFFSITE_TYPE: ${RCLONE_CONFIG_OFFSITE_TYPE:-}
      RCLONE_CONFIG_OFFSITE_PROVIDER: ${RCLONE_CONFIG_OFFSITE_PROVIDER:-}
      RCLONE_CONFIG_OFFSITE_ACCESS_KEY_ID: ${RCLONE_CONFIG_OFFSITE_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_OFFSITE_SECRET_ACCESS_KEY: ${RCLONE_CONFIG_OFFSITE_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_OFFSITE_ENDPOINT: ${RCLONE_CONFIG_OFFSITE_ENDPOINT:-}
      RCLONE_CONFIG_OFFSITE_REGION: ${RCLONE_CONFIG_OFFSITE_REGION:-}
      TZ: Europe/Paris
    entrypoint: ["/bin/sh", "/backup.sh"]
    volumes:
      - ./backup/backup.sh:/backup.sh:ro
      - media:/media:ro
      - backups:/backups
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  web:
    build:
      context: ../apps/web
      args:
        # Origine publique : le navigateur et le SSR passent par Caddy.
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
        # Identité du site (inlinée au build — vide = fallback de lib/site.ts).
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-}
        NEXT_PUBLIC_LOCATION: ${NEXT_PUBLIC_LOCATION:-}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-}
        NEXT_PUBLIC_EDITOR_NAME: ${NEXT_PUBLIC_EDITOR_NAME:-}
        NEXT_PUBLIC_EDITOR_STATUS: ${NEXT_PUBLIC_EDITOR_STATUS:-}
        NEXT_PUBLIC_EDITOR_ADDRESS: ${NEXT_PUBLIC_EDITOR_ADDRESS:-}
        NEXT_PUBLIC_EDITOR_SIRET: ${NEXT_PUBLIC_EDITOR_SIRET:-}
        NEXT_PUBLIC_EDITOR_PHONE: ${NEXT_PUBLIC_EDITOR_PHONE:-}
        NEXT_PUBLIC_HOST_NAME: ${NEXT_PUBLIC_HOST_NAME:-}
        NEXT_PUBLIC_HOST_ADDRESS: ${NEXT_PUBLIC_HOST_ADDRESS:-}
        NEXT_PUBLIC_LEGAL_DATE: ${NEXT_PUBLIC_LEGAL_DATE:-}
        # Mesure d'audience Umami (optionnelle — voir DEPLOY.md) :
        # src = https://stats.<domaine>/script.js, id = UUID du site dans Umami.
        NEXT_PUBLIC_ANALYTICS_SRC: ${NEXT_PUBLIC_ANALYTICS_SRC:-}
        NEXT_PUBLIC_ANALYTICS_WEBSITE_ID: ${NEXT_PUBLIC_ANALYTICS_WEBSITE_ID:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  # Mesure d'audience self-hosted (optionnelle) : activer avec
  # `docker compose --profile analytics up -d` après avoir créé la base
  # (voir DEPLOY.md « Mesure d'audience ») et décommenté le bloc stats.* du
  # Caddyfile. Sans le profil, ce service n'existe pas.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    profiles: ["analytics"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lesmenuires}:${POSTGRES_PASSWORD}@postgres:5432/umami
      DATABASE_TYPE: postgresql
      # Chaîne aléatoire longue (signature des sessions Umami).
      APP_SECRET: ${UMAMI_APP_SECRET:-}
      TZ: Europe/Paris
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

volumes:
  pgdata:
  media:
  backups:
  caddy_data:
  caddy_config:
